name: Compilar App de Facturacion

on:
  workflow_dispatch: # Esto te permite ejecutar el proceso manualmente con un boton

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el codigo
        uses: actions/checkout@v3

      - name: Configurar entorno Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Obtener dependencias
        run: flutter pub get

      - name: Generar codigo de ejecucion (Hive/JSON)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Construir el APK
        run: flutter build apk --release

      - name: Guardar el APK para descargar
        uses: actions/upload-artifact@v3
        with:
          name: App_Facturacion_POS
          path: build/app/outputs/flutter-apk/app-release.apk
